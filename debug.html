<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Google Gemini API 健檢工具</title>
    <style>
        body { font-family: "微軟正黑體", sans-serif; padding: 30px; background-color: #1a252f; color: #ecf0f1; }
        h2 { color: #f1c40f; }
        .input-group { margin-bottom: 20px; }
        input { padding: 10px; width: 350px; font-size: 16px; border-radius: 5px; border: 1px solid #7f8c8d; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #2ecc71; color: white; border: none; border-radius: 5px; font-weight: bold;}
        button:hover { background-color: #27ae60; }
        pre { background: #2c3e50; padding: 20px; border-radius: 8px; overflow-x: auto; color: #2ecc71; font-size: 14px; border: 1px solid #34495e; line-height: 1.5; white-space: pre-wrap;}
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <h2>🔍 Gemini API 模型探測器</h2>
    <p>請貼上你的 API Key，我們直接去問 Google 你的帳號目前到底支援哪些模型：</p>
    
    <div class="input-group">
        <input type="password" id="apiKey" placeholder="請輸入 API Key (AIzaSy...)">
        <button onclick="checkModels()">開始探測</button>
    </div>

    <h3>📡 探測結果：</h3>
    <pre id="output">等待測試中...</pre>

    <script>
        async function checkModels() {
            const key = document.getElementById("apiKey").value.trim();
            const output = document.getElementById("output");
            
            if (!key) { 
                output.innerHTML = "<span class='error'>❌ 逼逼！請先輸入金鑰！</span>"; 
                return; 
            }

            output.innerText = "連線中，正在讀取 Google 伺服器資料，請稍候...";
            
            try {
                // 呼叫 ListModels API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(JSON.stringify(err, null, 2));
                }
                
                const data = await response.json();
                let resultText = "✅ 測試成功！以下是你的金鑰「可呼叫 generateContent」的模型清單：\n\n";
                let hasFlash = false;

            data.models.forEach(m => {
                    if (m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent")) {
                        if (m.name && m.name.includes("flash")) hasFlash = true;
                        resultText += `🔹 模型完整名稱: 【 ${m.name} 】\n`;
                        resultText += `   - 顯示名稱: ${m.displayName}\n`;
                        resultText += `   - 輸入字數上限 (Input Tokens): ${m.inputTokenLimit || '未標示'}\n`;
                        resultText += `   - 輸出字數上限 (Output Tokens): ${m.outputTokenLimit || '未標示'}\n`;
                        resultText += `----------------------------------------\n`;
                    }
                });
                if(!hasFlash) {
                    resultText += "\n⚠️ 警告：你的金鑰列表中沒有看到包含 'flash' 的模型。\n請確認你的 Google Cloud 專案是否啟用了正確的 API 服務。";
                }

                output.innerText = resultText;
            } catch (error) {
                output.innerHTML = `<span class='error'>❌ 發生錯誤（請確認金鑰是否正確或有沒有被鎖）：\n${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
